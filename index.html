<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="磨耳朵">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<title>磨耳朵 · Podcast Reader</title>
</head>
<body>

<div id="topbar">
  <button class="btn-icon" id="btn-toggle-sidebar" title="侧边栏">&#9776;</button>
  <div class="logo">磨耳朵<span> · Podcast Reader</span></div>
  <div class="spacer"></div>
  <div class="ctrl-group" id="speed-presets">
    <span class="speed-preset" data-rate="0.75">0.75x</span>
    <span class="speed-preset active" data-rate="1">1x</span>
    <span class="speed-preset" data-rate="1.25">1.25x</span>
    <span class="speed-preset" data-rate="1.5">1.5x</span>
    <span class="speed-preset" data-rate="2">2x</span>
  </div>
  <div class="ctrl-group">
    <select id="voice-select" style="max-width:90px;"></select>
  </div>
  <button class="btn-icon" id="btn-focus" title="聚焦模式">&#9878;</button>
  <button class="btn-icon" id="btn-karaoke" title="卡拉OK模式">&#9655;</button>
  <button class="btn-icon" id="btn-smart-speed" title="紧凑模式">&#9889;</button>
  <button class="btn-icon" id="btn-sleep" title="定时关闭">&#9201;<span class="sleep-timer-badge" id="sleep-badge"></span></button>
  <button class="btn-icon" id="btn-features" title="功能全览">&#9733;</button>
  <button class="btn-icon" id="btn-mode" title="浅色/暗色">&#9788;</button>
  <button class="btn-icon" id="btn-settings" title="设置">&#9881;</button>
  <button class="btn-icon" id="btn-import-file" title="导入文件">&#128193;</button>
  <button class="btn-icon" id="btn-save" title="保存" style="color:var(--accent);">&#128190;</button>
</div>
<input type="file" id="file-input" accept=".txt,.md,.csv,.json,.pdf,.epub,.png,.jpg,.jpeg,.gif,.bmp,.webp" style="display:none">

<div id="main">
  <div id="sidebar" class="collapsed">
    <div id="sidebar-header">
      <h3>播客集</h3>
      <button id="btn-new-ep" title="新建">+</button>
      <button id="btn-auto-next" title="连续播放">&#128257;</button>
      <button id="btn-close-sidebar" title="返回">&#10005;</button>
    </div>
    <div id="episode-list"><div id="no-episodes">还没有保存的播客集<br>粘贴文字或拖入文件后点击「保存」</div></div>
  </div>

  <div id="content-area">
    <div id="title-row">
      <input type="text" id="title-input" placeholder="播客标题…">
      <button id="btn-annotate" title="添加批注">&#9998;</button>
      <button id="btn-bookmark" title="书签">&#128278;</button>
    </div>
    <div id="text-display" contenteditable="true"></div>
    <div id="karaoke-line"></div>
    <div id="drop-overlay">释放文件以导入</div>
    <div id="bookmark-panel"></div>
    <div id="ann-tooltip"></div>
  </div>
</div>

<div id="player-bar">
  <div id="progress-row">
    <div id="progress-bar">
      <div id="progress-fill"></div>
      <div id="bookmark-dots" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
    </div>
    <div id="time-display">--:-- / --:--</div>
  </div>
  <div id="controls-row">
    <button class="btn btn-skip" id="btn-rew" title="后退 15s">&#9664;&#9664;</button>
    <button class="btn" id="btn-play" title="播放/暂停">&#9654;</button>
    <button class="btn btn-skip" id="btn-fwd" title="前进 15s">&#9654;&#9654;</button>
    <button class="btn btn-skip" id="btn-export-mp3" title="导出音频" style="border-radius:4px;width:auto;padding:0 8px;font-size:11px;font-family:var(--font);">MP3</button>
  </div>
</div>

<div id="modal-overlay"><div id="modal"></div></div>
<div id="feature-tip" class="feature-tip"></div>
<div id="tutorial-overlay">
  <div id="tutorial-card"></div>
</div>
<div id="demo-badge">&#127912; 演示内容</div>
<div id="stats-panel"><button id="stats-close">&times;</button></div>
<div id="toast"></div>
<div id="ann-toolbar">添加批注</div>

<!-- CDN dependencies (must load before app modules) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- App modules (load order matters) -->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/highlight.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/annotations.js"></script>
<script src="js/tts.js"></script>
<script src="js/edge-tts.js"></script>
<script src="js/ai-tts.js"></script>
<script src="js/player.js"></script>
<script src="js/import.js"></script>
<script src="js/analytics.js"></script>
<script src="js/ui.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/app.js"></script>

</body>
</html>
