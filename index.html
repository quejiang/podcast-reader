<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="磨耳朵">
<link rel="manifest" href="manifest.json">
<title>磨耳朵 · Podcast Reader</title>
<style>
  :root {
    --bg:#0f0f14;--surface:#1a1a24;--surface2:#22222f;--border:#2a2a3a;
    --text:#e4e4ec;--text-dim:#8888a0;--accent:#f08060;--accent-glow:rgba(240,128,96,0.3);
    --play:#60d0a0;--danger:#e0556a;--radius:12px;--radius-sm:8px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"SF Mono","Fira Code","Cascadia Code",monospace;--shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  body.light {
    --bg:#f5f5f7;--surface:#fff;--surface2:#eaeaef;--border:#d5d5dd;
    --text:#1a1a2e;--text-dim:#7a7a8e;--accent:#e05550;
    --accent-glow:rgba(224,85,80,0.2);--shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;-webkit-tap-highlight-color:transparent}
  body{
    font-family:var(--font);background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;overflow:hidden;
    user-select:none;-webkit-user-select:none;transition:background .3s,color .3s;
  }
  #topbar{
    display:flex;align-items:center;gap:8px;padding:6px 14px;
    background:var(--surface);border-bottom:1px solid var(--border);
    flex-shrink:0;z-index:10;transition:background .3s;flex-wrap:wrap;
  }
  #topbar .logo{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--accent);white-space:nowrap}
  #topbar .logo span{color:var(--text-dim);font-weight:400}
  #topbar .spacer{flex:1;min-width:6px}
  .ctrl-group{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim)}
  .ctrl-group select,.ctrl-group input[type=range]{
    background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:3px 5px;font-size:11px;outline:none;cursor:pointer;
  }
  .ctrl-group select:focus{border-color:var(--accent)}
  .ctrl-group input[type=range]{
    -webkit-appearance:none;height:3px;padding:0;background:var(--border);width:56px;
  }
  .ctrl-group input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;
  }
  .speed-preset{
    padding:2px 6px;border-radius:4px;font-size:11px;background:var(--surface2);
    color:var(--text-dim);cursor:pointer;border:1px solid transparent;
    transition:all .15s;font-family:var(--mono);
  }
  .speed-preset:hover{border-color:var(--border);color:var(--text)}
  .speed-preset.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-icon{
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    font-size:15px;padding:3px 7px;border-radius:var(--radius-sm);
    transition:all .15s;position:relative;white-space:nowrap;
  }
  .btn-icon:hover{color:var(--text);background:var(--surface2)}
  .btn-icon.active{color:var(--accent)}
  .sleep-timer-badge{
    position:absolute;top:-2px;right:-2px;background:var(--accent);color:#fff;
    border-radius:10px;font-size:9px;padding:1px 4px;display:none;line-height:1.3;pointer-events:none;
  }
  .sleep-timer-badge.show{display:block}

  #main{display:flex;flex:1;overflow:hidden}

  /* Sidebar */
  #sidebar{
    width:260px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;transition:width .25s,background .3s;overflow:hidden;
  }
  #sidebar.collapsed{width:0;border:none}
  #sidebar-header{
    padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);flex-shrink:0;gap:6px;
  }
  #sidebar-header h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);flex:1}
  #sidebar-header button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px}
  #sidebar-header button:hover{color:var(--text);background:var(--surface2)}
  #episode-list{flex:1;overflow-y:auto;padding:5px}
  #episode-list::-webkit-scrollbar{width:4px}
  #episode-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .ep-card{
    padding:8px 9px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;
    transition:background .15s;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;
  }
  .ep-card:hover{background:var(--surface2)}
  .ep-card.active{background:var(--surface2);border-left-color:var(--accent)}
  .ep-card .ep-info{flex:1;min-width:0}
  .ep-card .ep-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-card .ep-meta{font-size:10px;color:var(--text-dim);margin-top:1px}
  .ep-card .ep-del{opacity:0;background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:opacity .15s}
  .ep-card:hover .ep-del{opacity:1}
  .ep-card .ep-del:hover{background:rgba(224,85,106,.15)}

  /* Content */
  #content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  #title-row{display:flex;align-items:center;gap:6px;padding-right:24px;flex-shrink:0}
  #title-input{
    width:100%;border:none;background:transparent;color:var(--text);
    font-size:19px;font-weight:600;padding:12px 0 6px 24px;outline:none;font-family:var(--font);
  }
  #title-input::placeholder{color:var(--text-dim)}
  #btn-bookmark{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:17px;padding:4px;border-radius:4px;transition:all .15s}
  #btn-bookmark:hover{color:var(--accent)}
  #btn-annotate{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:4px;border-radius:4px;transition:all .15s}
  #btn-annotate:hover{color:var(--accent)}

  #text-display{
    flex:1;overflow-y:auto;padding:4px 24px 16px;font-size:16px;line-height:1.8;
    letter-spacing:.01em;white-space:pre-wrap;word-break:break-word;
  }
  #text-display::-webkit-scrollbar{width:6px}
  #text-display::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  #text-display[contenteditable="true"]{cursor:text;user-select:text;-webkit-user-select:text;outline:none}
  #text-display[contenteditable="true"]:empty::before{
    content:"在这里粘贴文字，拖入文件，或点击 ⚙ 导入…";color:var(--text-dim);pointer-events:none;
  }
  #text-display mark{background:var(--accent);color:#fff;border-radius:2px;padding:0 1px;transition:background .1s}
  #text-display .ann-mark{background:rgba(96,208,160,.25);border-bottom:2px dotted var(--play);cursor:pointer;padding:0 1px}
  #text-display .ann-mark:hover{background:rgba(96,208,160,.4)}

  /* Focus mode */
  #text-display.focus-mode{font-size:22px;line-height:2;max-width:700px;margin:0 auto;padding:40px 24px}
  #text-display.focus-mode .para{opacity:.25;transition:opacity .3s}
  #text-display.focus-mode .para.active{opacity:1}

  /* Karaoke mode */
  #text-display.karaoke-mode{
    font-size:28px;line-height:2.2;text-align:center;max-width:600px;margin:0 auto;
    padding:30vh 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  #karaoke-line{display:none;font-size:32px;font-weight:700;line-height:1.6;text-align:center;transition:all .3s;padding:20px}

  /* Drop overlay */
  #drop-overlay{
    position:absolute;inset:0;background:rgba(240,128,96,.08);border:3px dashed var(--accent);
    border-radius:var(--radius);display:none;align-items:center;justify-content:center;
    font-size:20px;color:var(--accent);z-index:20;pointer-events:none;margin:16px;
  }
  #drop-overlay.show{display:flex}

  /* Player bar */
  #player-bar{
    background:var(--surface);border-top:1px solid var(--border);padding:7px 16px;
    flex-shrink:0;display:flex;flex-direction:column;gap:3px;transition:background .3s;
  }
  #progress-row{display:flex;align-items:center;gap:8px}
  #progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;overflow:hidden;position:relative}
  #progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear}
  #time-display{font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums;font-family:var(--mono);min-width:88px;text-align:right;white-space:nowrap}
  #controls-row{display:flex;align-items:center;justify-content:center;gap:10px}
  .btn{background:none;border:none;cursor:pointer;color:var(--text-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .btn:hover{color:var(--text)}
  .btn:active{transform:scale(.92)}
  #btn-play{width:40px;height:40px;background:var(--accent);color:#fff;font-size:16px}
  #btn-play:hover{filter:brightness(1.1)}
  .btn-skip{font-size:14px;width:28px;height:28px}

  /* Modal */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
  #modal-overlay.show{display:flex}
  #modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);transition:background .3s}
  #modal h3{font-size:15px;margin-bottom:12px;color:var(--text)}
  #modal label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:3px}
  #modal input[type=text],#modal input[type=url],#modal input[type=password],#modal textarea,#modal select{
    width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:7px 9px;font-size:12px;outline:none;
    font-family:var(--font);margin-bottom:10px;resize:vertical;
  }
  #modal input:focus,#modal textarea:focus,#modal select:focus{border-color:var(--accent)}
  #modal .row{display:flex;gap:6px;flex-wrap:wrap}
  #modal button{
    background:var(--accent);color:#fff;border:none;padding:7px 14px;
    border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:var(--font);
  }
  #modal button:hover{filter:brightness(1.1)}
  #modal button.secondary{background:var(--surface2);color:var(--text)}
  #modal .divider{border-top:1px solid var(--border);margin:12px 0}
  #modal .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
  #modal .tab-btn{padding:5px 10px;border-radius:4px;font-size:11px;background:var(--surface2);color:var(--text-dim);cursor:pointer;border:1px solid transparent}
  #modal .tab-btn.active{background:var(--accent);color:#fff}

  /* Bookmarks panel */
  #bookmark-panel{
    position:absolute;right:6px;top:46px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:6px;min-width:170px;max-height:220px;overflow-y:auto;
    box-shadow:var(--shadow);z-index:30;display:none;
  }
  #bookmark-panel.show{display:block}
  #bookmark-panel .bm-item{
    padding:5px 7px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--text);
    display:flex;justify-content:space-between;align-items:center;
  }
  #bookmark-panel .bm-item:hover{background:var(--surface2)}
  #bookmark-panel .bm-item .bm-del{color:var(--danger);font-size:11px;cursor:pointer;padding:2px 5px}
  #bookmark-panel .bm-empty{color:var(--text-dim);font-size:11px;text-align:center;padding:10px}

  /* Stats panel */
  #stats-panel{
    position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);
    z-index:90;padding:12px 20px;display:none;flex-direction:column;gap:8px;font-size:13px;
  }
  #stats-panel.show{display:flex}
  #stats-panel .stat-row{display:flex;justify-content:space-between;color:var(--text-dim)}
  #stats-panel .stat-row strong{color:var(--text)}
  #stats-close{position:absolute;top:4px;right:8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px}

  /* Annotation tooltip */
  #ann-tooltip{
    position:absolute;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:10px;max-width:260px;box-shadow:var(--shadow);
    z-index:35;display:none;font-size:12px;line-height:1.5;
  }
  #ann-tooltip.show{display:block}
  #ann-tooltip .ann-note{color:var(--text);margin-bottom:4px}
  #ann-tooltip button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:11px;padding:2px 4px}

  /* Toast */
  #toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--surface2);color:var(--text);padding:7px 16px;border-radius:20px;
    font-size:12px;border:1px solid var(--border);opacity:0;transition:opacity .3s;
    pointer-events:none;z-index:300;white-space:nowrap;
  }
  #toast.show{opacity:1}

  #ann-toolbar{position:absolute;background:var(--accent);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;z-index:40;display:none;cursor:pointer;white-space:nowrap}

  /* Tutorial overlay */
  #tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:none;align-items:center;justify-content:center}
  #tutorial-overlay.show{display:flex}
  #tutorial-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:24px 20px 20px;max-width:380px;width:90%;
    box-shadow:var(--shadow);text-align:center;position:relative;transition:background .3s;
  }
  #tutorial-card h2{font-size:20px;color:var(--accent);margin-bottom:4px}
  #tutorial-card .tut-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:16px}
  #tutorial-card .tut-icon{font-size:48px;display:block;margin-bottom:8px}
  #tutorial-card .tut-body{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:16px;text-align:left}
  #tutorial-card .tut-body kbd{
    background:var(--surface2);border:1px solid var(--border);border-radius:4px;
    padding:1px 5px;font-size:12px;font-family:var(--mono);color:var(--accent)
  }
  #tutorial-card .tut-step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
  #tutorial-card .tut-step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
  #tutorial-card .tut-step-dot.active{background:var(--accent)}
  #tutorial-card .tut-buttons{display:flex;gap:8px;justify-content:center}
  #tutorial-card button{
    background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:var(--radius-sm);
    cursor:pointer;font-size:13px;font-family:var(--font);transition:filter .15s;
  }
  #tutorial-card button:hover{filter:brightness(1.1)}
  #tutorial-card button.secondary{background:var(--surface2);color:var(--text)}
  #tutorial-card button.link{background:none;color:var(--text-dim);font-size:11px;padding:4px 8px;text-decoration:underline}
  #tutorial-card .tut-spotlight{
    position:absolute;border:2px solid var(--accent);border-radius:6px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.6);pointer-events:none;z-index:-1;transition:all .35s ease;
  }
  #help-btn{
    position:fixed;bottom:80px;right:16px;width:36px;height:36px;
    background:var(--accent);color:#fff;border:none;border-radius:50%;
    font-size:18px;cursor:pointer;z-index:100;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;transition:transform .15s;
  }
  #help-btn:hover{transform:scale(1.1)}

  /* Feature tour (in-app highlight tooltips) */
  .feature-tip{
    position:fixed;background:var(--surface);border:1px solid var(--accent);
    border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text);
    box-shadow:0 0 16px var(--accent-glow);z-index:350;max-width:200px;line-height:1.5;
    pointer-events:none;opacity:0;transition:opacity .3s;text-align:left;
  }
  .feature-tip.show{opacity:1}
  .feature-tip::after{
    content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
    border-top:6px solid var(--accent);
  }
  .feature-tip.bottom::after{top:-6px;bottom:auto;border-top:none;border-bottom:6px solid var(--accent)}

  /* demo content badge */
  #demo-badge{
    position:absolute;top:50px;right:20px;background:var(--accent);color:#fff;
    padding:3px 10px;border-radius:10px;font-size:11px;z-index:15;display:none;
    cursor:pointer;animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

  @media (max-width:700px){
    #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;width:260px}
    #sidebar.collapsed{width:0}
    #text-display{padding:4px 12px 12px;font-size:15px}
    #text-display.focus-mode{font-size:18px;padding:24px 12px}
    #text-display.karaoke-mode{font-size:22px;padding:20vh 12px}
    #karaoke-line{font-size:24px}
    #title-input{padding:10px 12px 4px;font-size:16px}
    #topbar{padding:5px 8px;gap:4px}
    #topbar .logo{font-size:14px}
    #player-bar{padding:5px 10px}
    #modal{max-width:100vw;padding:14px}
  }
</style>
</head>
<body>

<div id="topbar">
  <button class="btn-icon" id="btn-toggle-sidebar" title="侧边栏">&#9776;</button>
  <div class="logo">磨耳朵<span> · Podcast Reader</span></div>
  <div class="spacer"></div>
  <div class="ctrl-group" id="speed-presets">
    <span class="speed-preset" data-rate="0.75">0.75x</span>
    <span class="speed-preset active" data-rate="1">1x</span>
    <span class="speed-preset" data-rate="1.25">1.25x</span>
    <span class="speed-preset" data-rate="1.5">1.5x</span>
    <span class="speed-preset" data-rate="2">2x</span>
  </div>
  <div class="ctrl-group">
    <select id="voice-select" style="max-width:90px;"></select>
  </div>
  <button class="btn-icon" id="btn-focus" title="聚焦模式">&#9878;</button>
  <button class="btn-icon" id="btn-karaoke" title="卡拉OK模式">&#9655;</button>
  <button class="btn-icon" id="btn-smart-speed" title="跳过静音">&#9889;</button>
  <button class="btn-icon" id="btn-sleep" title="定时关闭">&#9201;<span class="sleep-timer-badge" id="sleep-badge"></span></button>
  <button class="btn-icon" id="btn-mode" title="浅色/暗色">&#9788;</button>
  <button class="btn-icon" id="btn-settings" title="设置">&#9881;</button>
  <button class="btn-icon" id="btn-save" title="保存" style="color:var(--accent);">&#128190;</button>
</div>

<div id="main">
  <div id="sidebar" class="collapsed">
    <div id="sidebar-header">
      <h3>播客集</h3>
      <button id="btn-new-ep" title="新建">+</button>
      <button id="btn-auto-next" title="连续播放">&#128257;</button>
    </div>
    <div id="episode-list"><div id="no-episodes">还没有保存的播客集<br>粘贴文字或拖入文件后点击「保存」</div></div>
  </div>

  <div id="content-area">
    <div id="title-row">
      <input type="text" id="title-input" placeholder="播客标题…">
      <button id="btn-annotate" title="添加批注">&#9998;</button>
      <button id="btn-bookmark" title="书签">&#128278;</button>
    </div>
    <div id="text-display" contenteditable="true"></div>
    <div id="karaoke-line"></div>
    <div id="drop-overlay">释放文件以导入</div>
    <div id="bookmark-panel"></div>
    <div id="ann-tooltip"></div>
  </div>
</div>

<div id="player-bar">
  <div id="progress-row">
    <div id="progress-bar">
      <div id="progress-fill"></div>
      <div id="bookmark-dots" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
    </div>
    <div id="time-display">--:-- / --:--</div>
  </div>
  <div id="controls-row">
    <button class="btn btn-skip" id="btn-rew" title="后退 15s">&#9664;&#9664;</button>
    <button class="btn" id="btn-play" title="播放/暂停">&#9654;</button>
    <button class="btn btn-skip" id="btn-fwd" title="前进 15s">&#9654;&#9654;</button>
    <button class="btn btn-skip" id="btn-export-mp3" title="导出音频" style="border-radius:4px;width:auto;padding:0 8px;font-size:11px;font-family:var(--font);">MP3</button>
  </div>
</div>

<div id="modal-overlay"><div id="modal"></div></div>
<div id="feature-tip" class="feature-tip"></div>
<div id="tutorial-overlay">
  <div id="tutorial-card"></div>
</div>
<div id="demo-badge">&#127912; 演示内容</div>
<div id="stats-panel"><button id="stats-close">&times;</button></div>
<div id="toast"></div>
<div id="ann-toolbar">添加批注</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(function(){
'use strict';

// DOM
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

const elTitle=$('#title-input'),elText=$('#text-display'),elDropOverlay=$('#drop-overlay');
const elVoiceSel=$('#voice-select'),elBtnPlay=$('#btn-play'),elBtnRew=$('#btn-rew'),elBtnFwd=$('#btn-fwd');
const elBtnSave=$('#btn-save'),elBtnNew=$('#btn-new-ep'),elBtnAutoNext=$('#btn-auto-next');
const elBtnToggle=$('#btn-toggle-sidebar'),elBtnMode=$('#btn-mode'),elBtnSettings=$('#btn-settings');
const elBtnSleep=$('#btn-sleep'),elBtnBookmark=$('#btn-bookmark'),elBtnAnnotate=$('#btn-annotate');
const elBtnFocus=$('#btn-focus'),elBtnKaraoke=$('#btn-karaoke'),elBtnSmartSpeed=$('#btn-smart-speed');
const elBtnExportMp3=$('#btn-export-mp3'),elSleepBadge=$('#sleep-badge');
const elSidebar=$('#sidebar'),elEpList=$('#episode-list'),elProgressFill=$('#progress-fill');
const elTimeDisplay=$('#time-display'),elToast=$('#toast');
const elModalOverlay=$('#modal-overlay'),elModal=$('#modal');
const elBmPanel=$('#bookmark-panel'),elAnnTooltip=$('#ann-tooltip'),elAnnToolbar=$('#ann-toolbar');
const elStatsPanel=$('#stats-panel'),elStatsClose=$('#stats-close'),elKaraokeLine=$('#karaoke-line');

// State
let episodes=[],currentEpId=null,isPlaying=false;
let words=[],wordIndex=-1,charProgress=0,totalChars=0;
let currentUtterance=null,voices=[],toastTimer=null;
let bookmarks=[],annotations=[];  // {charStart,charEnd,note,id}
let autoNext=false,sleepSeconds=0,sleepInterval=null;
let aiMode=null,aiAudio=null,aiAudioBlobs=[];
let smartSpeed=true,focusMode=false,karaokeMode=false;
let stats={totalCharsListened:0,totalSeconds:0,sessionCount:0};

// Settings
function getSpeed(){const a=$('#speed-presets .speed-preset.active');return a?parseFloat(a.dataset.rate):1}
function getVoice(){return voices.find(v=>v.voiceURI===elVoiceSel.value)||null}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('pr-settings')||'{}');
    if(s.voice)elVoiceSel.value=s.voice;
    if(s.rate){$$('#speed-presets .speed-preset').forEach(p=>p.classList.remove('active'));
      const m=[...$$('#speed-presets .speed-preset')].find(p=>p.dataset.rate===s.rate);if(m)m.classList.add('active');}
    if(s.autoNext!==undefined){autoNext=s.autoNext;elBtnAutoNext.classList.toggle('active',autoNext)}
    if(s.theme==='light')document.body.classList.add('light');
    if(s.smartSpeed!==undefined){smartSpeed=s.smartSpeed;elBtnSmartSpeed.classList.toggle('active',smartSpeed)}
    if(s.stats)stats=s.stats;
  }catch{}
}
function saveSettings(){
  const s={voice:elVoiceSel.value,rate:getSpeed().toFixed(2),autoNext,smartSpeed,
    theme:document.body.classList.contains('light')?'light':'dark',stats};
  localStorage.setItem('pr-settings',JSON.stringify(s));
}

// Toast
function toast(msg,d){clearTimeout(toastTimer);elToast.textContent=msg;elToast.classList.add('show');
  toastTimer=setTimeout(()=>elToast.classList.remove('show'),d||2000)}

// Episodes
function loadEpisodes(){try{episodes=JSON.parse(localStorage.getItem('pr-episodes')||'[]')}catch{episodes=[]}}
function saveEpisodes(){localStorage.setItem('pr-episodes',JSON.stringify(episodes))}
function loadDraft(){
  const d=localStorage.getItem('pr-draft');if(!d)return;
  try{const o=JSON.parse(d);elTitle.value=o.title||'';elText.textContent=o.content||'';
    currentEpId=o.epId||null;if(o.bookmarks)bookmarks=o.bookmarks;if(o.annotations)annotations=o.annotations||[]}catch{}
}
function saveDraft(){
  localStorage.setItem('pr-draft',JSON.stringify({
    title:elTitle.value,content:elText.textContent||'',epId:currentEpId,bookmarks,annotations}))
}
function renderEpisodeList(){
  elEpList.innerHTML='';
  if(!episodes.length){elEpList.innerHTML='<div id="no-episodes">还没有保存的播客集<br>粘贴文字或拖入文件后点击「保存」</div>';return}
  episodes.forEach(ep=>{
    const c=document.createElement('div');c.className='ep-card'+(ep.id===currentEpId?' active':'');
    c.innerHTML=`<div class="ep-info"><div class="ep-title">${esc(ep.title||'未命名')}</div>
      <div class="ep-meta">${esc(ep.createdAt||'')} · ${charCount(ep.content)}</div></div>
      <button class="ep-del" data-id="${ep.id}" title="删除">&times;</button>`;
    c.addEventListener('click',e=>{if(e.target.classList.contains('ep-del'))return;loadEpisode(ep.id)});
    c.querySelector('.ep-del').addEventListener('click',e=>{e.stopPropagation();deleteEpisode(ep.id)});
    elEpList.appendChild(c);
  });
}
function loadEpisode(id){
  stopPlayback();const ep=episodes.find(e=>e.id===id);if(!ep)return;
  currentEpId=ep.id;elTitle.value=ep.title||'';elText.textContent=ep.content||'';
  bookmarks=ep.bookmarks||[];annotations=ep.annotations||[];
  renderEpisodeList();resetWords();updateProgressUI();renderBookmarkDots();renderAnnotationMarks();toast('已加载')
}
function saveCurrentEpisode(){
  const content=elText.textContent||'',title=elTitle.value.trim()||'未命名';
  if(!content.trim()){toast('请先输入文字内容');return}
  if(currentEpId!==null){
    const idx=episodes.findIndex(e=>e.id===currentEpId);
    if(idx>=0){episodes[idx].title=title;episodes[idx].content=content;
      episodes[idx].bookmarks=bookmarks;episodes[idx].annotations=annotations;
      episodes[idx].updatedAt=new Date().toLocaleString('zh-CN')}
  }else{
    const ep={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title,content,
      bookmarks,annotations,createdAt:new Date().toLocaleString('zh-CN'),updatedAt:new Date().toLocaleString('zh-CN')};
    episodes.unshift(ep);currentEpId=ep.id
  }
  saveEpisodes();renderEpisodeList();saveDraft();toast('已保存')
}
function deleteEpisode(id){
  if(!confirm('确定删除？'))return;stopPlayback();
  episodes=episodes.filter(e=>e.id!==id);
  if(currentEpId===id){currentEpId=null;elTitle.value='';elText.textContent='';bookmarks=[];annotations=[]}
  saveEpisodes();renderEpisodeList();resetWords();updateProgressUI();renderBookmarkDots();toast('已删除')
}
function newEpisode(){stopPlayback();currentEpId=null;elTitle.value='';elText.textContent='';bookmarks=[];annotations=[];
  renderEpisodeList();resetWords();updateProgressUI();renderBookmarkDots();saveDraft();elText.focus()}
function playNextEpisode(){
  if(!autoNext||!currentEpId)return;
  const idx=episodes.findIndex(e=>e.id===currentEpId);
  if(idx<0||idx>=episodes.length-1)return;
  loadEpisode(episodes[idx+1].id);setTimeout(startPlayback,200);toast('自动播放下一集')
}

// Helpers
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function charCount(s){const l=(s||'').replace(/\s/g,'').length;if(l<500)return l+' 字';if(l<10000)return (l/1000).toFixed(1)+'k 字';return (l/10000).toFixed(1)+'w 字'}
function formatTime(sec){if(!isFinite(sec)||sec<0)return '--:--';const m=Math.floor(sec/60),s=Math.floor(sec%60);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}

// Word-level chunking
function buildWords(text){
  if(!text||!text.trim())return[];
  const result=[];let pos=0;
  const re=/([\u4e00-\u9fff\u3400-\u4dbf]+|[a-zA-Z0-9]+|[\u3000-\u303f\uff00-\uffef]|[^\S\n]+|[\n]+|[^\u4e00-\u9fff\u3400-\u4dbfa-zA-Z0-9\s])/g;
  let m;while((m=re.exec(text))!==null){const t=m[1];if(!t)continue;
    if(/^[\u4e00-\u9fff\u3400-\u4dbf]+$/.test(t)&&t.length>3){for(let i=0;i<t.length;i+=2){
      const sub=t.slice(i,Math.min(i+3,t.length));result.push({text:sub,charStart:m.index+i,charEnd:m.index+i+sub.length})}
    }else{result.push({text:t,charStart:m.index,charEnd:m.index+t.length})}}
  return result
}
function resetWords(){const t=elText.textContent||'';words=buildWords(t);wordIndex=-1;charProgress=0;totalChars=t.length}

// Highlighting
function clearHighlight(){
  elText.querySelectorAll('mark').forEach(m=>{const p=m.parentNode;p.replaceChild(document.createTextNode(m.textContent),m);p.normalize()})
}
function highlightWordRange(cs,ce){
  clearHighlight();if(cs>=ce||!totalChars)return;
  const w=document.createTreeWalker(elText,NodeFilter.SHOW_TEXT,null,false);let cp=0;const nodes=[];
  while(w.nextNode()){const n=w.currentNode,l=n.textContent.length,ns=cp,ne=cp+l;if(ne>cs&&ns<ce)nodes.push({node:n,nodeStart:ns,nodeEnd:ne});cp=ne;if(cp>=ce)break}
  for(let i=nodes.length-1;i>=0;i--){const{node,nodeStart,nodeEnd}=nodes[i];
    const rs=Math.max(0,cs-nodeStart),re=Math.min(nodeEnd-nodeStart,ce-nodeStart);
    const b=node.textContent.slice(0,rs),mid=node.textContent.slice(rs,re),a=node.textContent.slice(re);
    const f=document.createDocumentFragment();if(b)f.appendChild(document.createTextNode(b));
    const mk=document.createElement('mark');mk.textContent=mid;f.appendChild(mk);if(a)f.appendChild(document.createTextNode(a));
    node.parentNode.replaceChild(f,node)}
  const fm=elText.querySelector('mark');if(fm)fm.scrollIntoView({behavior:'smooth',block:'center'})
}

// Annotations
function addAnnotation(note){
  const sel=window.getSelection();if(!sel||sel.rangeCount===0||!sel.toString().trim())return;
  const range=sel.getRangeAt(0);if(!elText.contains(range.commonAncestorContainer))return;
  // Calculate char offsets
  const pre=document.createRange();pre.setStart(elText,0);pre.setEnd(range.startContainer,range.startOffset);
  const charStart=pre.toString().length;
  const charEnd=charStart+range.toString().length;
  annotations.push({charStart,charEnd,note,id:Date.now().toString(36)});
  annotations.sort((a,b)=>a.charStart-b.charStart);
  sel.removeAllRanges();
  renderAnnotationMarks();saveDraft();toast('已添加批注')
}
function removeAnnotation(id){annotations=annotations.filter(a=>a.id!==id);renderAnnotationMarks();saveDraft()}
function showAnnotationTooltip(ann,e){
  elAnnTooltip.innerHTML=`<div class="ann-note">${esc(ann.note)}</div><button data-id="${ann.id}">删除批注</button>`;
  elAnnTooltip.style.left=e.pageX+'px';elAnnTooltip.style.top=(e.pageY+10)+'px';
  elAnnTooltip.classList.add('show');
  elAnnTooltip.querySelector('button').addEventListener('click',()=>{removeAnnotation(ann.id);elAnnTooltip.classList.remove('show')})
}
function renderAnnotationMarks(){
  // Remove existing annotation marks
  elText.querySelectorAll('.ann-mark').forEach(m=>{const p=m.parentNode;p.replaceChild(document.createTextNode(m.textContent),m);p.normalize()});
  if(!annotations.length||!totalChars)return;
  // For simplicity during playback, skip re-rendering as it'd interfere with highlight
  // We'll render them on idle (not playing)
  if(isPlaying)return;
  annotations.forEach(ann=>{
    if(ann.charStart>=totalChars||ann.charEnd>totalChars)return;
    const w=document.createTreeWalker(elText,NodeFilter.SHOW_TEXT,null,false);let cp=0;
    while(w.nextNode()){const n=w.currentNode,l=n.textContent.length,ns=cp,ne=cp+l;
      if(ne>ann.charStart&&ns<ann.charEnd){
        const rs=Math.max(0,ann.charStart-ns),re=Math.min(ne-ns,ann.charEnd-ns);
        const b=n.textContent.slice(0,rs),mid=n.textContent.slice(rs,re),a=n.textContent.slice(re);
        const f=document.createDocumentFragment();if(b)f.appendChild(document.createTextNode(b));
        const sp=document.createElement('span');sp.className='ann-mark';sp.textContent=mid;
        sp.title=ann.note;sp.addEventListener('click',e=>{e.stopPropagation();showAnnotationTooltip(ann,e)});
        f.appendChild(sp);if(a)f.appendChild(document.createTextNode(a));
        n.parentNode.replaceChild(f,n);break}
      cp=ne;if(cp>=ann.charEnd)break}
  })
}

// Bookmarks
function addBookmark(label){
  if(!totalChars)return;
  const id=Date.now().toString(36);bookmarks.push({charPos:charProgress,label:label||'',id});
  bookmarks.sort((a,b)=>a.charPos-b.charPos);renderBookmarkDots();saveDraft();toast('已添加书签')
}
function removeBookmark(id){bookmarks=bookmarks.filter(b=>b.id!==id);renderBookmarkDots();saveDraft()}
function jumpToBookmark(id){const bm=bookmarks.find(b=>b.id===id);if(!bm)return;seekToChar(bm.charPos);elBmPanel.classList.remove('show')}
function renderBookmarkDots(){
  const c=$('#bookmark-dots');c.innerHTML='';if(!totalChars)return;
  bookmarks.forEach(bm=>{
    const d=document.createElement('div');d.style.cssText=`position:absolute;left:${(bm.charPos/totalChars)*100}%;top:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:var(--play);pointer-events:auto;cursor:pointer;z-index:2`;
    d.title=bm.label||'书签';d.addEventListener('click',e=>{e.stopPropagation();seekToChar(bm.charPos)});c.appendChild(d)
  })
}
function showBookmarkPanel(){
  elBmPanel.innerHTML='';
  if(!bookmarks.length){elBmPanel.innerHTML='<div class="bm-empty">暂无书签<br>播放中按 b 添加</div>'}
  else bookmarks.forEach(bm=>{
    const pre=(elText.textContent||'').slice(Math.max(0,bm.charPos-10),bm.charPos+15).trim();
    const item=document.createElement('div');item.className='bm-item';
    item.innerHTML=`<span>${esc(bm.label||pre||'(空)')}</span><span class="bm-del" data-id="${bm.id}">&times;</span>`;
    item.addEventListener('click',e=>{if(e.target.classList.contains('bm-del')){removeBookmark(bm.id);showBookmarkPanel()}else{jumpToBookmark(bm.id)}});
    elBmPanel.appendChild(item)
  });
  elBmPanel.classList.toggle('show')
}

// Sleep timer
function showSleepMenu(){
  const opts=[{label:'关闭',m:0},{label:'15 分钟',m:15},{label:'30 分钟',m:30},{label:'45 分钟',m:45},{label:'60 分钟',m:60}];
  elModal.innerHTML='<h3>定时关闭</h3>'+opts.map(o=>`<button style="display:block;width:100%;margin-bottom:5px;" class="${sleepSeconds===o.m*60?'':'secondary'}" data-m="${o.m}">${o.label}</button>`).join('')+'<button class="secondary" style="margin-top:6px;width:100%;" id="btn-close-modal">取消</button>';
  elModalOverlay.classList.add('show');
  elModal.querySelectorAll('button[data-m]').forEach(b=>b.addEventListener('click',()=>{setSleepTimer(parseInt(b.dataset.m)*60);elModalOverlay.classList.remove('show')}));
  $('#btn-close-modal').addEventListener('click',()=>elModalOverlay.classList.remove('show'))
}
function setSleepTimer(sec){
  clearInterval(sleepInterval);sleepSeconds=sec;
  if(sec<=0){elSleepBadge.classList.remove('show');elSleepBadge.textContent='';toast('定时关闭已取消');return}
  updateSleepBadge();elSleepBadge.classList.add('show');
  sleepInterval=setInterval(()=>{sleepSeconds--;updateSleepBadge();if(sleepSeconds<=0){clearInterval(sleepInterval);stopPlayback();elSleepBadge.classList.remove('show');toast('定时关闭 - 已停止',3000)}},1000);
  toast('将于 '+formatTime(sec)+' 后停止')
}
function updateSleepBadge(){const m=Math.floor(sleepSeconds/60),s=sleepSeconds%60;elSleepBadge.textContent=m+':'+String(s).padStart(2,'0')}

// TTS
function populateVoices(){
  voices=speechSynthesis.getVoices();elVoiceSel.innerHTML='';
  const zh=voices.filter(v=>v.lang.startsWith('zh')),other=voices.filter(v=>!v.lang.startsWith('zh'));
  for(const g of[{label:'中文',voices:zh},{label:'其他',voices:other}]){
    if(!g.voices.length)continue;const og=document.createElement('optgroup');og.label=g.label;
    for(const v of g.voices){const o=document.createElement('option');o.value=v.voiceURI;o.textContent=v.name.split(' ').slice(0,2).join(' ');og.appendChild(o)}
    elVoiceSel.appendChild(og)
  }
  loadSettings();if(!elVoiceSel.value&&zh.length)elVoiceSel.value=zh[0].voiceURI
}

function speakWord(index){
  if(index>=words.length){stopPlayback();toast('播放完毕');updateProgressUI();updateStats();if(autoNext)setTimeout(playNextEpisode,500);return}
  if(!isPlaying&&currentUtterance===null)return;
  wordIndex=index;const w=words[index];
  let speakText=w.text,speakStart=w.charStart,speakEnd=w.charEnd;
  let j=index+1;
  while(j<words.length&&(words[j].text.match(/^[\u4e00-\u9fff]+$/)?words[j].text.length<=2:words[j].text.length<=3)&&j-index<4){speakText+=words[j].text;speakEnd=words[j].charEnd;j++}
  const wordsInGroup=j-index;
  const utter=new SpeechSynthesisUtterance(speakText);
  utter.voice=getVoice();utter.rate=getSpeed();utter.lang=utter.voice?utter.voice.lang:'zh-CN';
  utter.onstart=()=>{charProgress=speakStart;highlightWordRange(speakStart,Math.min(speakStart+5,speakEnd));updateProgressUI();updateKaraoke()};
  let lastBI=0;
  utter.onboundary=evt=>{if(evt.charIndex!==undefined&&evt.charIndex>lastBI){lastBI=evt.charIndex;
    for(let k=0;k<wordsInGroup;k++){const wi=index+k;if(wi<words.length&&evt.charIndex<=(k+1)*(speakText.length/wordsInGroup)){charProgress=words[wi].charStart;highlightWordRange(words[wi].charStart,words[wi].charEnd);updateProgressUI();updateKaraoke();break}}}
  };
  utter.onend=()=>{const lwi=index+wordsInGroup-1;charProgress=lwi<words.length?words[lwi].charEnd:speakEnd;updateProgressUI();
    if(isPlaying){const delay=smartSpeed?20:120;setTimeout(()=>speakWord(lwi+1),delay)}else{currentUtterance=null}
  };
  utter.onerror=e=>{if(e.error==='canceled'||e.error==='interrupted'){currentUtterance=null;return}
    charProgress=speakEnd;updateProgressUI();if(isPlaying)setTimeout(()=>speakWord(index+wordsInGroup),100);else currentUtterance=null};
  currentUtterance=utter;speechSynthesis.speak(utter)
}

function startPlayback(){
  if(isPlaying)return;const text=elText.textContent||'';if(!text.trim()){toast('请先输入文字内容');return}
  if(speechSynthesis.paused){speechSynthesis.resume();isPlaying=true;updatePlayButton();return}
  if(words.length===0||totalChars!==text.length)resetWords();
  if(!words.length){toast('没有可朗读的内容');return}
  let si=0;if(charProgress>0&&charProgress<totalChars){for(let i=0;i<words.length;i++){if(words[i].charEnd>charProgress){si=i;break}}}
  isPlaying=true;updatePlayButton();stats.sessionCount++;saveSettings();
  if(aiMode){speakAiChunk(si)}else{speakWord(si)}
}
function pausePlayback(){isPlaying=false;speechSynthesis.pause();updatePlayButton()}
function stopPlayback(){isPlaying=false;speechSynthesis.cancel();currentUtterance=null;if(aiAudio){aiAudio.pause();aiAudio=null}aiAudioBlobs=[];updatePlayButton();clearHighlight()}
function seekToChar(tc){seekByChars(Math.max(0,Math.min(totalChars,tc))-charProgress)}
function seekByChars(dc){
  if(!words.length){resetWords();if(!words.length)return}
  const wp=isPlaying;if(isPlaying){speechSynthesis.cancel();currentUtterance=null}
  charProgress=Math.max(0,Math.min(totalChars,charProgress+dc));
  let ni=0;for(let i=0;i<words.length;i++){if(words[i].charEnd>charProgress){ni=i;break}ni=i}
  wordIndex=ni;updateProgressUI();updateKaraoke();
  if(words[ni])highlightWordRange(words[ni].charStart,words[ni].charEnd);
  if(wp){isPlaying=true;setTimeout(()=>aiMode?speakAiChunk(ni):speakWord(ni),50)}else{isPlaying=false;updatePlayButton()}
}
function updatePlayButton(){elBtnPlay.innerHTML=isPlaying?'&#10074;&#10074;':'&#9654;'}
function updateProgressUI(){
  if(!totalChars){elProgressFill.style.width='0%';elTimeDisplay.textContent='--:-- / --:--';return}
  elProgressFill.style.width=Math.min(100,Math.round(charProgress/totalChars*100))+'%';
  const cps=4*getSpeed();elTimeDisplay.textContent=formatTime(charProgress/cps)+' / '+formatTime(totalChars/cps)
}

// Karaoke mode
function updateKaraoke(){
  if(!karaokeMode||wordIndex<0||wordIndex>=words.length)return;
  const w=words[wordIndex],text=elText.textContent||'';
  // Find paragraph containing this word
  const paras=text.split(/\n+/);let pos=0;
  for(const p of paras){const pe=pos+p.length;if(w.charStart>=pos&&w.charStart<pe+1){elKaraokeLine.textContent=p.trim();break}pos=pe+1}
}

// Focus mode - highlight current paragraph
function updateFocusMode(){
  if(!focusMode||wordIndex<0||wordIndex>=words.length)return;
  const w=words[wordIndex];const text=elText.textContent||'';
  const paras=text.split(/\n+/);let pos=0;
  elText.querySelectorAll('.para').forEach(p=>p.classList.remove('active'));
  for(const p of paras){const pe=pos+p.length;if(w.charStart>=pos&&w.charStart<pe+1){
    const paraEls=elText.querySelectorAll('.para');let pi=0;for(const paraText of paras){if(paraText===p)break;pi++}
    if(paraEls[pi])paraEls[pi].classList.add('active');break}pos=pe+1}
}

// Stats tracking
function updateStats(){
  if(totalChars)stats.totalCharsListened+=charProgress;
  const cps=4*getSpeed();if(totalChars)stats.totalSeconds+=charProgress/cps;
  saveSettings()
}

// AI TTS
async function fetchAiAudio(text){
  const cfg=JSON.parse(localStorage.getItem('pr-ai')||'{}');
  if(cfg.mode==='elevenlabs'){
    if(!cfg.elevenLabsKey)throw new Error('请配置 ElevenLabs API Key');
    const resp=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${cfg.elevenLabsVoice||'21m00Tcm4TlvDq8ikWAM'}`,{
      method:'POST',headers:{'xi-api-key':cfg.elevenLabsKey,'Content-Type':'application/json'},
      body:JSON.stringify({text,model_id:'eleven_multilingual_v2',
        voice_settings:{stability:cfg.stability||0.5,similarity_boost:cfg.similarity||0.75,style:cfg.style||0,speed:getSpeed()}})});
    if(!resp.ok)throw new Error('ElevenLabs: '+resp.status);return await resp.blob()
  }else if(cfg.mode==='openai'){
    if(!cfg.openaiKey)throw new Error('请配置 OpenAI API Key');
    const resp=await fetch('https://api.openai.com/v1/audio/speech',{
      method:'POST',headers:{'Authorization':'Bearer '+cfg.openaiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'tts-1',input:text,voice:cfg.openaiVoice||'alloy',speed:getSpeed()})});
    if(!resp.ok)throw new Error('OpenAI: '+resp.status);return await resp.blob()
  }
  throw new Error('未配置 AI 引擎')
}

function speakAiChunk(index){
  if(index>=words.length){stopPlayback();toast('播放完毕');updateStats();if(autoNext)setTimeout(playNextEpisode,500);return}
  if(!isPlaying)return;
  wordIndex=index;const w=words[index];highlightWordRange(w.charStart,w.charEnd);charProgress=w.charStart;updateProgressUI();updateKaraoke();updateFocusMode();
  let batchText=w.text,batchEnd=w.charEnd,j=index+1;
  while(j<words.length&&batchText.length<300&&j-index<10){batchText+=words[j].text;batchEnd=words[j].charEnd;j++}
  const wib=j-index;
  fetchAiAudio(batchText).then(blob=>{
    if(!isPlaying)return;aiAudioBlobs.push(blob);
    const url=URL.createObjectURL(blob);aiAudio=new Audio(url);aiAudio.playbackRate=getSpeed();
    const totalMs=(aiAudio.duration||batchText.length/3.5/getSpeed())*1000;
    const mpw=smartSpeed?totalMs/wib*0.3:totalMs/wib;
    let wo=0;const iv=setInterval(()=>{if(!isPlaying||!aiAudio||aiAudio.paused){clearInterval(iv);return}
      wo++;const wi=index+wo;if(wi<words.length){wordIndex=wi;charProgress=words[wi].charStart;highlightWordRange(words[wi].charStart,words[wi].charEnd);updateProgressUI();updateKaraoke();updateFocusMode()}},mpw);
    aiAudio.onended=()=>{clearInterval(iv);URL.revokeObjectURL(url);charProgress=batchEnd;updateProgressUI();
      if(isPlaying){const d=smartSpeed?20:150;setTimeout(()=>speakAiChunk(index+wib),d)}};
    aiAudio.onerror=()=>{clearInterval(iv);URL.revokeObjectURL(url);charProgress=batchEnd;updateProgressUI();if(isPlaying)setTimeout(()=>speakAiChunk(index+wib),200)};
    aiAudio.play().catch(()=>{})
  }).catch(err=>{toast('AI TTS 失败：'+err.message,3000);aiMode=null;isPlaying=false;updatePlayButton()})
}

// Override startPlayback for AI
const _sp=startPlayback;startPlayback=function(){
  if(isPlaying)return;const text=elText.textContent||'';if(!text.trim()){toast('请先输入文字内容');return}
  if(words.length===0||totalChars!==text.length)resetWords();if(!words.length){toast('没有可朗读的内容');return}
  const cfg=JSON.parse(localStorage.getItem('pr-ai')||'{}');aiMode=cfg.mode||null;
  if(aiMode){let si=0;if(charProgress>0&&charProgress<totalChars){for(let i=0;i<words.length;i++){if(words[i].charEnd>charProgress){si=i;break}}}
    isPlaying=true;aiAudioBlobs=[];updatePlayButton();speakAiChunk(si)}else{_sp()}
};

// MP3 Export

// OCR for scanned PDFs / images
async function ocrFile(file){
  toast('正在 OCR 识别（可能需要数十秒）…',10000);
  try{
    const {data:{text}}=await Tesseract.recognize(file,'chi_sim+eng',{logger:m=>{
      if(m.status==='recognizing text')toast('OCR: '+Math.round(m.progress*100)+'%',5000)}});
    return text
  }catch(e){throw new Error('OCR 失败: '+e.message)}
}

// RSS import
async function fetchRSS(url){
  toast('正在获取 RSS…',5000);
  try{
    const resp=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
    if(!resp.ok)throw new Error('RSS API 不可用');
    const data=await resp.json();if(data.status!=='ok')throw new Error(data.message||'RSS 解析失败');
    return data.items.map(it=>({title:it.title,content:(it.description||'').replace(/<[^>]+>/g,''),link:it.link,date:it.pubDate}))
  }catch(e){throw new Error('RSS 获取失败: '+e.message)}
}

// Google Drive link
async function fetchGoogleDrive(url){
  const m=url.match(/\/d\/([^/]+)/)||url.match(/id=([^&]+)/);if(!m)throw new Error('无效的 Google Drive 链接');
  const id=m[1];const resp=await fetch(`https://drive.google.com/uc?export=download&id=${id}`);
  if(!resp.ok)throw new Error('无法访问（可能需要公开分享权限）');
  const ct=resp.headers.get('content-type')||'';
  if(ct.includes('text/html'))throw new Error('文件未公开共享或类型不支持');
  return await resp.text()
}

// File handling
function setText(text,filename){

async function handleFiles(files){
  const file=files[0];if(!file)return;const ext=file.name.split('.').pop().toLowerCase();
  try{
    if(ext==='pdf'){
      toast('解析 PDF…',5000);const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:ab}).promise;let text='';
      for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const c=await page.getTextContent();text+=c.items.map(it=>it.str).join(' ')+'\n'}
      // If text is very short/empty, try OCR
      if(text.replace(/\s/g,'').length<50){toast('PDF 无文字层，尝试 OCR…',5000);text=await ocrFile(file)}
      setText(text,file.name)
    }else if(ext==='epub'){
      toast('解析 EPUB…',5000);const ab=await file.arrayBuffer();const zip=await JSZip.loadAsync(ab);
      const hf=Object.keys(zip.files).filter(f=>f.endsWith('.xhtml')||f.endsWith('.html')||f.endsWith('.htm'));
      let text='';for(const f of hf){const hs=await zip.files[f].async('string');const d=document.createElement('div');d.innerHTML=hs;d.querySelectorAll('script,style,rt,rp').forEach(el=>el.remove());text+=d.textContent+'\n'}
      setText(text.replace(/\n{3,}/g,'\n\n').trim(),file.name)
    }else if(['jpg','jpeg','png','gif','bmp','webp'].includes(ext)){
      toast('OCR 识别图片…',10000);const text=await ocrFile(file);setText(text,file.name)
    }else if(['txt','md','markdown','html','htm'].includes(ext)){
      const r=new FileReader();r.onload=()=>{let text=r.result;
        if(ext==='html'||ext==='htm'){const d=document.createElement('div');d.innerHTML=text;text=d.textContent}
        setText(text,file.name)};r.readAsText(file)
    }else{toast('支持 txt/md/html/pdf/epub/图片。旧版 PDF 自动 OCR。')}
  }catch(e){toast('文件解析失败：'+e.message,3000)}
}

    case 'b':e.preventDefault();addBookmark('');break;
    case 'f':e.preventDefault();toggleFocusMode();break;
    case 'k':e.preventDefault();toggleKaraokeMode();break;
    case 'h':e.preventDefault();if(typeof showTutorial==='function')showTutorial(0);break;
  }
});

      { icon: '&#128278;', title: '第 3 步：书签 & 批注', body: '<strong>随时标记，随时回顾：</strong><br><br>&#8226; 按 <kbd>b</kbd> 或点击右上 <kbd>&#128278;</kbd> 添加<strong>书签</strong><br>&#8226; 进度条上的绿点就是书签，点击可跳转<br>&#8226; 选中文字后弹出批注工具，添加<strong>批注</strong><br>&#8226; 批注文字会有下划线，点击可查看' },
      { icon: '&#128190;', title: '第 4 步：保存播客集', body: '点击右上 <kbd>&#128190; 保存</kbd> 存入侧边栏。<br><br>&#8226; 所有播客集自动保存到<strong>浏览器本地</strong><br>&#8226; 点击左侧 <kbd>&#9776;</kbd> 打开侧边栏管理<br>&#8226; 开启连续播放 &#128257; 可<strong>自动播下一集</strong><br>&#8226; 设置 → 同步 → 可导出/导入备份' },
      { icon: '&#9889;', title: '第 5 步：高级功能', body: '<strong>更多实用功能：</strong><br><br>&#8226; <kbd>&#9878; 聚焦模式</kbd> — 只高亮当前段落<br>&#8226; <kbd>&#9655; 卡拉OK</kbd> — 当前行居中大字显示<br>&#8226; <kbd>&#9889; 跳过静音</kbd> — 去掉朗读间的停顿<br>&#8226; <kbd>&#9201; 定时关闭</kbd> — 睡前自动停<br>&#8226; <kbd>&#9788; 浅色主题</kbd> — 白天看更舒服<br>&#8226; <kbd>MP3 导出</kbd> — 需配置 AI 语音引擎' },
      { icon: '&#129302;', title: 'AI 语音（可选）', body: '系统自带 TTS 免费，但音质机械。<br><br>想听<strong>接近真人</strong>的声音？<br><br>点击 <kbd>&#9881; 设置</kbd> → AI 语音 → 选择 <strong>ElevenLabs</strong> 或 <strong>OpenAI TTS</strong> → 填入 API Key。<br><br>ElevenLabs 中文效果最好，推荐 Multilingual v2 模型。<br><br>配置后即可启用 <strong>MP3 导出</strong>、情感参数调节等。' },
      { icon: '&#127881;', title: '全部掌握！', body: '你已经学会了所有核心功能 🎉<br><br>&#8226; 底部 <kbd>?</kbd> 按钮可随时重新查看教程<br>&#8226; 遇到问题？右下角 <kbd>?</kbd> 点击即可<br><br>享受你的播客时光吧 ☕' },
    ];

    if (step >= steps.length) {
      finishTutorial();
      return;
    }

    if (step < 0) step = 0;

    // Show feature tip for contextual steps
    const elTip = $('#feature-tip');
    elTip.classList.remove('show');

    const card = $('#tutorial-card');
    card.innerHTML = `
      <span class="tut-icon">${steps[step].icon}</span>
      <h2>${steps[step].title}</h2>
      <div class="tut-step-dots">${steps.map((_,i)=>`<div class="tut-step-dot${i===step?' active':''}"></div>`).join('')}</div>
      <div class="tut-body">${steps[step].body}</div>
      <div class="tut-buttons">
        ${step > 0 ? '<button class="secondary" id="tut-prev">上一步</button>' : ''}
        ${step < steps.length - 1 ? '<button id="tut-next">'+(step===0?'开始':'下一步')+'</button>' : '<button id="tut-finish">完成</button>'}
        <button class="link" id="tut-skip">跳过教程</button>
      </div>
    `;

    $('#tutorial-overlay').classList.add('show');

    // Bind buttons
    const btnPrev = $('#tut-prev');
    const btnNext = $('#tut-next');
    const btnFinish = $('#tut-finish');
    const btnSkip = $('#tut-skip');

    if (btnPrev) btnPrev.addEventListener('click', () => renderTutorial(step - 1));
    if (btnNext) btnNext.addEventListener('click', () => renderTutorial(step + 1));
    if (btnFinish) btnFinish.addEventListener('click', finishTutorial);
    if (btnSkip) btnSkip.addEventListener('click', finishTutorial);

    // Contextual feature highlights for steps 1-6
    showContextualTip(step);

    // Save current step
    localStorage.setItem(TUT_STEP_KEY, step);
  }

  function showContextualTip(step) {
    const elTip = $('#feature-tip');
    elTip.classList.remove('show');

    // Map step to element to highlight
    const highlights = {
      1: { el: '#text-display', msg: '👆 在这里粘贴文字或拖入文件', pos: 'bottom' },
      2: { el: '#btn-play', msg: '👆 点击播放或按空格键', pos: 'top' },
      3: { el: '#btn-bookmark', msg: '👆 添加书签标记当前位置', pos: 'bottom' },
      4: { el: '#btn-save', msg: '👆 保存为播客集', pos: 'bottom' },
      5: { el: '#btn-smart-speed', msg: '高级功能在这里', pos: 'top' },
      6: { el: '#btn-settings', msg: '👆 点击设置配置 AI 语音', pos: 'bottom' },
    };

    const h = highlights[step];
    if (!h) {
      // Dim the spotlight
      const spot = document.createElement('div');
      spot.id = 'tut-spotlight-temp';
      spot.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);pointer-events:none;z-index:350;transition:opacity .3s';
      const old = $('#tut-spotlight-temp');
      if (old) old.remove();
      document.body.appendChild(spot);
      return;
    }

    removeSpotlight();
    const target = $(h.el);
    if (!target) return;

    const rect = target.getBoundingClientRect();
    const spot = document.createElement('div');
    spot.id = 'tut-spotlight-temp';
    spot.style.cssText = `
      position:fixed;left:${rect.left-6}px;top:${rect.top-6}px;
      width:${rect.width+12}px;height:${rect.height+12}px;
      border:2px solid var(--accent);border-radius:8px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.55);
      pointer-events:none;z-index:350;transition:all .25s;
    `;
    document.body.appendChild(spot);

    // Position tip
    elTip.textContent = h.msg;
    elTip.className = 'feature-tip ' + (h.pos || 'top') + ' show';
    if (h.pos === 'bottom') {
      elTip.style.top = (rect.bottom + 12) + 'px';
    } else {
      elTip.style.bottom = (window.innerHeight - rect.top + 12) + 'px';
    }
    elTip.style.left = Math.max(10, rect.left + rect.width/2 - 100) + 'px';
  }

  function removeSpotlight() {
    const el = $('#tut-spotlight-temp');
    if (el) el.remove();
  }

  function finishTutorial() {
    $('#tutorial-overlay').classList.remove('show');
    removeSpotlight();
    const elTip = $('#feature-tip');
    elTip.classList.remove('show');
    localStorage.setItem(TUT_KEY, '1');
    localStorage.removeItem(TUT_STEP_KEY);

    // Load demo content if first time and no content
    if (!episodes.length && !elText.textContent.trim()) {
      loadDemoContent();
    }
  }

  function loadDemoContent() {
    const demoText = `人工智能正在深刻改变我们的生活方式。从智能手机上的语音助手，到自动驾驶汽车，再到医疗诊断中的影像分析，AI 已经渗透到了社会的方方面面。

在语音技术领域，文本转语音（TTS）系统已经从早期的机械式发音，发展到了今天几乎可以以假乱真的自然语音合成。现代 TTS 不仅能准确读出文字，还能根据上下文调整语调、语速和情感表达。

深度学习模型的突破是这一进步的关键。通过在海量语音数据上训练，AI 学会了人类说话时的微妙变化——什么时候停顿、什么时候重读、什么时候加快或放慢。

对于学习语言的人来说，这意味着一场革命。你不再需要找人朗读给你听，也不需要反复听同一段录音。只需要把文字投喂给 AI，它就能像一位耐心的朗读者一样，用自然的语调为你读出每一个字。

这就是"磨耳朵"的意义所在——通过反复聆听，让耳朵逐渐适应目标语言的节奏和语调。就像婴儿学说话一样，听多了，自然就会了。

无论是准备雅思听力考试，还是想提高英语语感，或是单纯想用碎片时间多吸收一些信息，文字转语音都是你的得力助手。

打开一本书，粘贴一段文字，点击播放，闭上眼静静听。知识就这样流进了耳朵里。`;

    elText.textContent = demoText;
    elTitle.value = 'AI 与语音技术 · 演示播客';
    resetWords();
    updateProgressUI();
    saveDraft();
    const badge = $('#demo-badge');
    badge.style.display = 'block';
    badge.addEventListener('click', () => {
      badge.style.display = 'none';
      elText.textContent = '';
      elTitle.value = '';
      resetWords();
      updateProgressUI();
      saveDraft();
    });
    toast('已加载演示内容，点击播放试试吧');

    // Auto-remove badge after playback starts
    const origPlay = elBtnPlay.onclick;
    const check = () => {
      if (isPlaying) {
        badge.style.display = 'none';
        elBtnPlay.removeEventListener('click', check);
      }
    };
    elBtnPlay.addEventListener('click', check);
  }

  // Reshow tutorial on step resume
  const savedStep = localStorage.getItem(TUT_STEP_KEY);
  if (savedStep !== null && !tutDone) {
    setTimeout(() => renderTutorial(parseInt(savedStep)), 300);
  }
}
